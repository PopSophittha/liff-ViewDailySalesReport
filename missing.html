<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>กะที่ยังไม่ครบ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; padding:20px; background:#f9f9f9; }
table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#f44336; color:white; }
h2 { text-align:center; }
button { margin-bottom:10px; }
tr:nth-child(even){ background:#ffecec; }
</style>
</head>

<body>

<h2>⚠️ กะที่ยังไม่ครบ</h2>

<button onclick="goBack()">⬅️ กลับ</button>

<table>
<thead>
<tr>
<th>สาขา</th>
<th>วันที่</th>
<th>กะ</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
function goBack(){
  window.history.back();
}

function loadMissing(){
  let data = JSON.parse(sessionStorage.getItem("missingData") || "[]");

  const tbody = document.getElementById("tableBody");

  if (data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='3'>ไม่มีข้อมูล</td></tr>";
    return;
  }

  // 🔥 เรียงจากใหม่ → เก่า
  data.sort((a,b)=>{
    const da = new Date(a.date.split("/").reverse());
    const db = new Date(b.date.split("/").reverse());
    return db - da;
  });

// 🔥 group branch + date
const grouped = {};

data.forEach(d => {
  const key = d.branch + "_" + d.date;

  if (!grouped[key]) {
    grouped[key] = {
      branch: d.branch,
      date: d.date,
      shifts: new Set() // ✅ ใช้ set กันซ้ำ
    };
  }

  grouped[key].shifts.add(d.shift);
});

// 🔥 เรียงวันที่ใหม่ → เก่า
const sorted = Object.values(grouped).sort((a,b)=>{
  const da = new Date(a.date.split("/").reverse());
  const db = new Date(b.date.split("/").reverse());
  return db - da;
});

// 🔥 function เรียง shift
function sortShift(shifts){
  const order = {
    "09:00-14:00": 1,
    "14:00-18:00": 2,
    "18:00-23:00": 3
  };

  return [...shifts].sort((a,b)=>{
    return (order[a] || 99) - (order[b] || 99);
  });
}

// 🔥 render
tbody.innerHTML = sorted.map(d => `
  <tr>
    <td>${d.branch}</td>
    <td>${d.date}</td>
    <td>${sortShift(d.shifts).join(", ")}</td>
  </tr>
`).join("");
}

loadMissing();
</script>

</body>
</html>
