<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>รายงานส่งยอดขาย</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; padding:20px; background:#f9f9f9; text-align:center; }
table { width:100%; max-width:900px; margin:auto; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#4CAF50; color:white; }
#alertBox { color:red; font-weight:bold; margin-bottom:10px; cursor:pointer; }

input { padding:5px; margin:5px; width:120px; }
button { padding:6px 12px; margin:5px; }

/* 🔄 Loading */
#loadingOverlay {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.3);
  z-index:99999;
  justify-content:center;
  align-items:center;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid #eee;
  border-top:6px solid #4CAF50;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
</style>
</head>

<body>

<h2>💰 รายงานส่งยอดขาย</h2>

<div id="alertBox"></div>

<!-- 🔍 filter -->
<div>
  <input type="text" id="filterBranch" placeholder="สาขา">
  <input type="text" id="filterDate" placeholder="วันที่ (1/4/2026)">
  <button onclick="reload()">ค้นหา</button>
</div>

<table>
<thead>
<tr>
<th>สาขา</th>
<th>วันที่</th>
<th>เวลา</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<!-- 📄 paging -->
<div>
  <button onclick="prevPage()">◀ ก่อนหน้า</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">ถัดไป ▶</button>
</div>

<!-- 🔴 Popup -->
<div id="popup" style="
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:9999;
max-height:70vh;
overflow-y:auto;
width:90%;
max-width:600px;
">
<div id="popupText"></div>
<button onclick="closePopup()">ปิด</button>
</div>

<!-- 🔄 Loading -->
<div id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwLQUuRzCf4MzRJ3A1H2DDmyfHJQRFfE21xgqkTS2wnaK3lUn-fMnDhrSFzDkzu_nwm3w/exec";

let currentPage = 0;
const pageSize = 20;
let totalRows = 0;

let globalMissing = [];
let hasShown = false;
let isLoading = false;

// =====================
// loading control
// =====================
function showLoading(show){
  const overlay = document.getElementById("loadingOverlay");
  overlay.style.display = show ? "flex" : "none";

  document.body.style.pointerEvents = show ? "none" : "auto";
  overlay.style.pointerEvents = "auto";
}

// =====================
// โหลดข้อมูล
// =====================
async function loadData() {

  if (isLoading) return;
  isLoading = true;

  showLoading(true);

  try {

    const branch = document.getElementById("filterBranch").value || "";
    const date = document.getElementById("filterDate").value || "";

    const start = currentPage * pageSize;

    const url = `${API_URL}?start=${start}&limit=${pageSize}&branch=${encodeURIComponent(branch)}&date=${encodeURIComponent(date)}`;

    const res = await fetch(url);
    const json = await res.json();

    totalRows = json.total || 0;
    globalMissing = json.missingShifts || [];

    renderTable(json.data || []);
    updatePageInfo();
    showBanner(globalMissing);

    if (!hasShown) {
      showPopup(globalMissing);
      hasShown = true;
    }

  } catch (err) {
    console.error(err);
    document.getElementById("tableBody").innerHTML =
      "<tr><td colspan='3'>โหลดข้อมูลผิดพลาด</td></tr>";
  }

  showLoading(false);
  isLoading = false;
}

// =====================
// ตาราง
// =====================
function renderTable(data) {
  const tbody = document.getElementById("tableBody");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='3'>ไม่มีข้อมูล</td></tr>";
    return;
  }

  tbody.innerHTML = data.map(r => `
    <tr>
      <td>${r.branch}</td>
      <td>${r.date}</td>
      <td>${r.time}</td>
    </tr>
  `).join("");
}

// =====================
// paging
// =====================
function updatePageInfo(){
  document.getElementById("pageInfo").innerText =
    `หน้า ${currentPage+1} / ${Math.ceil(totalRows/pageSize) || 1}`;
}

function nextPage(){
  if ((currentPage+1)*pageSize < totalRows){
    currentPage++;
    loadData();
  }
}

function prevPage(){
  if (currentPage > 0){
    currentPage--;
    loadData();
  }
}

// =====================
// filter
// =====================
function reload(){
  currentPage = 0;
  loadData();
}

// =====================
// banner
// =====================
function showBanner(list){
  const box = document.getElementById("alertBox");

  if (list.length > 0) {
    box.innerHTML = `⚠️ พบ ${list.length} กะที่ยังไม่ครบ (กดเพื่อดู)`;

    box.onclick = () => {
      sessionStorage.setItem("missingData", JSON.stringify(list));
      window.location.href = "./missing.html";
    };

  } else {
    box.innerText = "";
  }
}

// =====================
// popup summary
// =====================
function showPopup(list){

  if (!list || list.length === 0) return;

  const grouped = {};

  list.forEach(d => {
    if (!grouped[d.branch]) {
      grouped[d.branch] = new Set();
    }
    grouped[d.branch].add(d.date);
  });

  let html = `<b>⚠️ สาขาที่ยังไม่ครบ</b><br><br>`;

  html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;">`;

  Object.keys(grouped).forEach(branch => {

    html += `<div style="border:1px solid #eee; padding:8px; border-radius:8px;">
      <b>📍 ${branch}</b><br>วันที่:<br>
    `;

    [...grouped[branch]]
      .sort((a,b)=>{
        const da = new Date(a.split("/").reverse());
        const db = new Date(b.split("/").reverse());
        return da - db;
      })
      .forEach(date => {
        html += `${date}<br>`;
      });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("popupText").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// =====================
loadData();
</script>

</body>
</html>
