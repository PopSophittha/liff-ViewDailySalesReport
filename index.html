<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

  
<title>รายงานส่งยอดขาย</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; padding:20px; background:#f9f9f9; text-align:center; }
table { width:100%; max-width:800px; margin:auto; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#4CAF50; color:white; }
#alertBox { color:red; font-weight:bold; margin-bottom:10px; }
</style>
</head>

<body>

<h2>💰 รายงานส่งยอดขาย</h2>
<div id="alertBox"></div>

<table>
<thead>
<tr>
<th>สาขา</th>
<th>วันที่</th>
<th>เวลา</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<!-- 🔴 Popup -->
<div id="popup" style="
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:9999;
max-height:70vh;
overflow-y:auto;
width:90%;
max-width:600px;
">
<div id="popupText"></div>
<button onclick="closePopup()">ปิด</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwLQUuRzCf4MzRJ3A1H2DDmyfHJQRFfE21xgqkTS2wnaK3lUn-fMnDhrSFzDkzu_nwm3w/exec";

let hasShown = false;
let globalMissing = [];

// =====================
// โหลดข้อมูล
// =====================
async function loadData() {
  const res = await fetch(API_URL);
  const json = await res.json();

  globalMissing = json.missingShifts || [];

  renderTable(json.data || []);
  showBanner(globalMissing);

  if (!hasShown) {
    showPopup(globalMissing);
    hasShown = true;
  }
}

// =====================
// ตาราง
// =====================
function renderTable(data) {
  const tbody = document.getElementById("tableBody");

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='3'>ไม่มีข้อมูล</td></tr>";
    return;
  }

  tbody.innerHTML = data.map(r => `
    <tr>
      <td>${r.branch}</td>
      <td>${r.date}</td>
      <td>${r.time}</td>
    </tr>
  `).join("");
}

// =====================
// banner (กดได้)
// =====================
function showBanner(list){
  const box = document.getElementById("alertBox");

  if (list.length > 0) {
    box.innerHTML = `⚠️ พบ ${list.length} กะที่ยังไม่ครบ (กดเพื่อดู)`;
    box.style.cursor = "pointer";

    box.onclick = () => {
      sessionStorage.setItem("missingData", JSON.stringify(list));
      window.location.href = "./missing.html";
    };

  } else {
    box.innerText = "";
  }
}

// =====================
// popup (วันนี้ - ค.ศ.)
// =====================
function showPopup(list){

  if (!list || list.length === 0) return;

  // 🔥 group ตาม branch
  const grouped = {};

  list.forEach(d => {
    if (!grouped[d.branch]) {
      grouped[d.branch] = new Set();
    }
    grouped[d.branch].add(d.date);
  });

  let html = `<b>⚠️ สาขาที่ยังไม่ครบ</b><br><br>`;

  // 🔥 เริ่ม grid 2 column
  html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;">`;

  Object.keys(grouped).forEach(branch => {

    html += `<div style="border:1px solid #eee; padding:8px; border-radius:8px;">
      <b>📍 ${branch}</b><br>
      วันที่:<br>
    `;

    [...grouped[branch]]
      .sort((a,b)=>{
        const da = new Date(a.split("/").reverse());
        const db = new Date(b.split("/").reverse());
        return da - db;
      })
      .forEach(date => {
        html += `${date}<br>`;
      });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("popupText").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

loadData();
</script>

</body>
</html>
