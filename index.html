<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>รายงานส่งยอดขาย</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; padding:20px; background:#f9f9f9; text-align:center; }
table { width:100%; max-width:800px; margin:auto; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#4CAF50; color:white; }
#alertBox { color:red; font-weight:bold; margin-bottom:10px; }
</style>
</head>

<body>

<h2>💰 รายงานส่งยอดขาย</h2>
<div id="alertBox"></div>

<table>
<thead>
<tr>
<th>สาขา</th>
<th>วันที่</th>
<th>เวลา</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<!-- 🔴 Popup -->
<div id="popup" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:9999;">
<div id="popupText"></div>
<button onclick="closePopup()">ปิด</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxGIayYGdPWhxBIcsFOpuvKYSs8iot-MKMXLPeO2JlrZmiZF85Fpul9MjtXxfvb7h1mYw/exec";
let hasShown = false;

async function loadData() {
  const res = await fetch(API_URL);
  const json = await res.json();

  renderTable(json.data);
  showBanner(json.missingShifts);

  if (!hasShown) {
    showPopup(json.missingShifts);
    hasShown = true;
  }
}

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = data.map(r => `
    <tr>
      <td>${r.branch}</td>
      <td>${r.date}</td>
      <td>${r.time}</td>
    </tr>
  `).join("");
}

// 🔴 banner
function showBanner(list){
  document.getElementById("alertBox").innerText =
    list.length > 0 ? `⚠️ พบ ${list.length} กะที่ยังไม่ครบ` : "";
}

// 🔴 popup (เฉพาะวันนี้)
function showPopup(list){
  const today = new Date().toLocaleDateString("th-TH");

  const todayList = list.filter(d => d.date === today);
  if (todayList.length === 0) return;

  let html = "<b>⚠️ วันนี้ยังไม่ครบ</b><br><br>";

  todayList.forEach(d => {
    html += `${d.branch} | ${d.shift}<br>`;
  });

  document.getElementById("popupText").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

loadData();
</script>

</body>
</html>
